<!doctype html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Travel Georgia</title>
  <link rel="stylesheet" href="style3.css">
</head>
<body>

  <header>
    <h1>🌍 Discover Georgia</h1>
    <p>მოგზაურობა საქართველოს ულამაზეს ადგილებში</p>
  </header>

  <section class="places">
    <h2>📌 პოპულარული მიმართულებები</h2>
    <ul>
      <li>ქართლის მთები</li>
      <li>ყაზბეგი და გერგეთის ტაძარი</li>
      <li>ბორჯომის ხეობა</li>
      <li>ბათუმის ბულვარი</li>
      <li>სვანეთის კოშკები</li>
    </ul>
  </section>

  <section class="form-section">
    <h2>✈️ დაჯავშნე ტური</h2>
    <form>
      <label for="name">სახელი:</label>
      <input type="text" id="name" placeholder="ჩაწერეთ თქვენი სახელი" required>

      <label for="email">ელ.ფოსტა:</label>
      <input type="email" id="email" placeholder="ჩაწერეთ ელ.ფოსტა" required>

      <label for="destination">სასურველი მიმართულება:</label>
      <select id="destination">
        <option>ქართლის მთები</option>
        <option>ყაზბეგი</option>
        <option>ბორჯომი</option>
        <option>ბათუმი</option>
        <option>სვანეთი</option>
      </select>

      <button type="submit">გაგზავნა</button>
    </form>
  </section>

  <footer>
    <p>© 2025 Travel Georgia | ყველა უფლება დაცულია</p>
  </footer>

</body>
</html>
